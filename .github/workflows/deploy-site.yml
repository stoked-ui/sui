name: Deploy Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-site-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Install SST
        run: curl -fsSL https://ion.sst.dev/install | bash

      - name: Configure AWS credentials (Production)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::167217327520:role/stoked-ui-prod-github
          aws-region: us-east-1

      - name: Install dependencies
        run: pnpm install

      - name: Deploy production site
        env:
          ROOT_DOMAIN: sui.stokd.cloud,consulting.stokd.cloud
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
        run: |
          set -euo pipefail
          sst install
          if ! sst deploy --stage production --verbose 2>&1 | tee /tmp/sst-deploy.log; then
            if grep -q "A concurrent update was detected on the app" /tmp/sst-deploy.log; then
              echo "Detected stale SST lock. Unlocking and retrying once."
              sst unlock --stage production
              sst deploy --stage production --verbose
            else
              exit 1
            fi
          fi

      - name: Seed production product data
        env:
          ROOT_DOMAIN: sui.stokd.cloud,consulting.stokd.cloud
          # seed-products.ts reads MONGODB_URI directly; sst shell does not
          # inject linked secrets as raw env vars, so pass it explicitly.
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          set -euo pipefail
          pnpm --filter stokedui-com products:seed:mac-mixer
