name: Publish Packages

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'packages-internal/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - 'turbo.json'
      - '.github/workflows/publish-packages.yml'

permissions:
  contents: read

concurrency:
  group: publish-packages-main
  cancel-in-progress: true

jobs:
  validate:
    if: ${{ github.actor != 'l10nbot' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Use Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm
      - run: pnpm install
      - run: pnpm build:ci
      - name: Validate OpenAPI spec is up to date
        run: pnpm --filter @stoked-ui/media-api openapi:validate
      - run: pnpm release:changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: pnpm validate-declarations
      - name: pnpm release:tag
        run: pnpm release:tag --dryRun

  publish:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Use Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install
      - name: Build all publishable artifacts
        run: pnpm build:all
      - name: Publish packages to npm
        run: pnpm publish --recursive --tag latest --no-git-checks --provenance
