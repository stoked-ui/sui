name: CI

on:
  push:
    branches-ignore:
      - 'renovate/**'
      - main
  pull_request:
    paths-ignore:
      - 'site/**'
      - 'docs/**'
      - 'examples/**'

permissions:
  contents: read

jobs:
  test-dev:
    if: ${{ github.actor != 'l10nbot' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - run: echo "${{ github.actor }}"
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Use Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm
      - run: pnpm install
      - run: pnpm build:ci
      - name: Validate OpenAPI spec is up to date
        run: pnpm --filter @stoked-ui/media-api openapi:validate
      - run: pnpm release:changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: pnpm validate-declarations
      - name: pnpm release:tag
        run: pnpm release:tag --dryRun
